# Confluence FCT minting config — MINIMAL version (only confirmed-required fields).
#
# Fields in mint_fct_full_info.confluence.yaml were tested and trimmed to only
# what is confirmed necessary. See that file for the full annotated field set.
#
# Usage:
#   fsrt mint-fct \
#     --app-dir /path/to/your/forge-app \
#     --config ./scripts/mint_fct_min_info.confluence.yaml \
#
# Can add --dry-run to see rendered variables without sending the request.
#
# WARNING: Output includes auth material (cookies/tokens).

product: confluence

# Atlassian GraphQL gateway for the target site.
graphql_endpoint: "https://lhe2.atlassian.net/gateway/api/graphql"

# Confirmed working mutation shape. This is also the default baked into the Rust
# binary — the mutation: field here is optional but kept for visibility and easy editing.
mutation: |
  mutation useGetContextTokenMutation($cloudId: ID!, $input: ConfluenceForgeContextTokenRequestInput!) {
    confluence_generateForgeContextToken(cloudId: $cloudId, input: $input) {
      success
      errors {
        message
        __typename
      }
      forgeContextToken {
        jwt
        expiresAt
        extensionId
        __typename
      }
      __typename
    }
  }

auth:
  # Switch between auth types by changing 'type'. Only one block is active at a time.

  # Option 1: Raw cookie (confirmed working — ~30 day lifetime)
  # Capture the Cookie header from a live browser session via Burp/DevTools.
  # type: raw_cookie
  # raw_cookie_file: "./session-cookie.txt"
  # Format of session-cookie.txt:
  #   tenant.session.token=eyJ...; atlassian.xsrf.token=5748ec3f...

  # Option 2: API token (confirmed working for Confluence)
  # Generate at: https://id.atlassian.com/manage-profile/security/api-tokens
  type: basic_api_token
  email: "lhe2@atlassian.com"
  api_token_file: "./api-token.txt"  # paste your API token into this file


# Required IDs — replace with values for your installation.
confluence:
  cloud_id: "c9376ebe-9f83-43ad-921d-2d6ed561bde4"         # curl https://YOUR-SITE.atlassian.net/_edge/tenant_info
  installation_id: "2690fda2-67ef-454b-b479-009b3f6ab5fe"  # forge install list --json → installationId (bare UUID)
  environment_id: "96b19e70-50b3-4b31-8e6e-b023414a9795"   # forge environments list → environment UUID
  # module_key — auto-detected from manifest.yml (first module key found); override here if needed

# Confirmed minimum variables to mint a valid FCT.
variables:
  cloudId: "${config.confluence.cloud_id}"
  input:
    contextIds:
      - 'ari:cloud:confluence::site/${config.confluence.cloud_id}'
    extensionSpecificContexts:
      appVersion: "1.0.0"     # REQUIRED (String! — non-null)
      extensionId: "ari:cloud:ecosystem::extension/${manifest.app_id_bare}/${config.confluence.environment_id}/static/${manifest.module_key}"
      extensionType: "xen:macro"
      installationId: "${config.confluence.installation_id}"
      context:
        type: "macro"
        environmentId: "${config.confluence.environment_id}"
        extension:              # REQUIRED (ConfluenceForgeExtensionData! — non-null)
          type: "macro"         # REQUIRED (String! — only field needed)
