# Confluence FCT minting config — FULL version (all known fields included).
# Emulates a full FCT request from Confluence macro as seen through BurpSuite.
#
# Fields marked # MANUAL were tested and found unnecessary for minting.
# Use mint_fct_min_info.confluence.yaml for the minimal working version.
#
# Usage:
#   python3 scripts/mint_fct_spike.py \
#     --app-dir /path/to/your/forge-app \
#     --config ./scripts/mint_fct_full_info.confluence.yaml \
#     --dry-run
#
# Then remove --dry-run once ready.
#
# WARNING: The spike prints cookies/tokens by default because this is intended for
# local investigation only. Do not paste output into public tickets, logs, or chat.

product: confluence

# Usually the Atlassian GraphQL gateway for the target site. Confirm the exact
# endpoint while testing the mutation.
graphql_endpoint: "https://lhe2.atlassian.net/gateway/api/graphql"

# Default mutation used by the Python script. Keep it here so the spike can be
# edited quickly if the real schema/return shape differs.
#
# Schema used:
#   ConfluenceForgeContextTokenRequestInput:
#     contextIds: [String]!
#     extensionSpecificContexts: ConfluenceExtensionSpecificContext!
#
#   ConfluenceExtensionSpecificContext:
#     appVersion: String!
#     context: ConfluenceForgePayloadContext!
#     extensionId: String!
#     extensionType: String
#     installationId: String
#
#   ConfluenceForgePayloadContext (minimal fields used here):
#     moduleKey: String
#     type: String
#     contentId: String
#     spaceKey: String
#     siteUrl: String
#     extension: ConfluenceForgeExtensionData!
#
#   ConfluenceForgeExtensionData (minimal fields used here):
#     type: String!
mutation: |
  mutation useGetContextTokenMutation($cloudId: ID!, $input: ConfluenceForgeContextTokenRequestInput!) {
    confluence_generateForgeContextToken(cloudId: $cloudId, input: $input) {
      success
      errors {
        message
        __typename
      }
      forgeContextToken {
        jwt
        expiresAt
        extensionId
        __typename
      }
      __typename
    }
  }

# Paste the full Cookie header value from a live Burp capture or DevTools here.
# The gateway validates the full cookie context including AWSALB, io, xsrf tokens etc.
auth:
  type: raw_cookie
  raw_cookie_file: "./session-cookie.txt"

# Values FSRT cannot reliably infer from manifest.yml. These are intentionally
# Confluence-specific for this spike.
confluence:
  cloud_id: "c9376ebe-9f83-43ad-921d-2d6ed561bde4"
  account_id: "712020:0b63737a-2ddb-4ed4-9b46-cae44383ac99"
  content_id: "12353537" 
  space_key: "~7120200b63737a2ddb4ed49b46cae44383ac99" 
  space_id: "1277955" 
  installation_id: "2690fda2-67ef-454b-b479-009b3f6ab5fe"
  environment_id: "96b19e70-50b3-4b31-8e6e-b023414a9795"
  environment_type: "DEVELOPMENT"
  local_id: "abce9c59-181b-4d7a-9c38-c0586eb95346" 
  module_key: "forge-remote-app-node"
  site_url: "https://lhe2.atlassian.net"

# Optional: fully override GraphQL variables.
#
# The Python spike supports placeholders from:
#   ${manifest.app_id}
#   ${manifest.app_name}
#   ${manifest.module_key}
#   ${manifest.module_type}
#   ${config.confluence.cloud_id}
#   ${config.confluence.content_id}
#   ${config.confluence.space_key}
#   ${config.confluence.installation_id}
#   ${config.confluence.site_url}
#
# This is a minimal starting point — adjust after inspecting real mutation errors.
# extensionSpecificContexts is a list; extend if the app has multiple modules.
variables:
  cloudId: "${config.confluence.cloud_id}"
  input:
    contextIds:
      - 'ari:cloud:confluence::site/${config.confluence.cloud_id}'
    extensionSpecificContexts:
      appVersion: "2.7.0"
      extensionId: "ari:cloud:ecosystem::extension/${manifest.app_id_bare}/${config.confluence.environment_id}/static/${manifest.module_key}"
      extensionType: "xen:macro"
      installationId: "${config.confluence.installation_id}"
      context:
        appVersion: "2.7.0"
        moduleKey: "${manifest.module_key}"
        type: "macro"
        contentId: "${config.confluence.content_id}" 
        spaceKey: "${config.confluence.space_key}" 
        siteUrl: "${config.confluence.site_url}"
        localId: "${config.confluence.local_id}" 
        environmentId: "${config.confluence.environment_id}"
        environmentType: "${config.confluence.environment_type}"
        content: 
          id: "${config.confluence.content_id}" 
          type: "page" 
          subtype: null 
          version: 7 
        space: 
          id: "${config.confluence.space_id}" 
          key: "${config.confluence.space_key}" 
        macro: null 
        extension:
          type: "macro"
          content: 
            id: "${config.confluence.content_id}" 
            type: "page" 
            subtype: null 
            version: 7 
          space: 
            id: "${config.confluence.space_id}" 
            key: "${config.confluence.space_key}" 
