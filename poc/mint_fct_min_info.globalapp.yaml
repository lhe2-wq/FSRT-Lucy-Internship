# Global app FCT minting config — MINIMAL version (only confirmed-required fields).
#
# Calls globalApp_signForgeContextTokens on XIS (Xen Invocation Service).
# Tested against: local jira-testing-app
#
# Usage:
#   fsrt mint-fct \
#     --app-dir /path/to/your/forge-app \
#     --config ./scripts/mint_fct_min_info.globalapp.yaml \
#
# Can add --dry-run to see rendered variables without sending the request.
#
# WARNING: Output includes auth material (cookies/tokens).

product: global

# Atlassian GraphQL gateway for the target site.
graphql_endpoint: "https://lhe2.atlassian.net/gateway/api/graphql"

# Confirmed working mutation shape. This is also the default baked into the Rust
# binary — the mutation: field here is optional but kept for visibility and easy editing.
mutation: |
  mutation SignForgeContextToken($input: GlobalAppSignForgeContextTokensInput!) {
    globalApp_signForgeContextTokens(input: $input) {
      success
      errors {
        message
        __typename
      }
      tokens {
        jwt
        expiresAt
        extensionId
        __typename
      }
      __typename
    }
  }

auth:
  # Switch between auth types by changing 'type'. Only one block is active at a time.

  # Option 1: Raw cookie (confirmed working — ~30 day lifetime)
  # Capture the Cookie header from a live browser session via Burp/DevTools.
  type: raw_cookie
  raw_cookie_file: "./session-cookie.txt"
  # Format of session-cookie.txt:
  #   tenant.session.token=eyJ...; atlassian.xsrf.token=5748ec3f...

  # NOTE: API token — NOT supported for this mutation.

# Required IDs — replace with values for your installation.
global:
  cloud_id: "c9376ebe-9f83-43ad-921d-2d6ed561bde4"            # curl https://YOUR-SITE.atlassian.net/_edge/tenant_info
  installation_id: "4a5b78d5-ffac-429a-8e81-cc78536c32eb"     # forge install list --json → installationId (bare UUID)
  environment_id: "bc237ecd-0bbf-4923-9378-beec6192b5f3"      # forge environments list → environment UUID
  # module_key — auto-detected from manifest.yml (first module key found); override here if needed
  # module_key: "hello-jira-issue-panel"

# Confirmed minimum variables to mint a valid FCT.
variables:
  input:
    contextIds:
      - "ari:cloud:jira::site/${config.global.cloud_id}"
    unlicensed: false
    extensionContexts:
      - appVersion: "1.0.0"
        extensionId: "ari:cloud:ecosystem::extension/${manifest.app_id_bare}/${config.global.environment_id}/static/${manifest.module_key}"
        extensionType: "xen:issuePanel"
        installationId: "${config.global.installation_id}"
        context:
          cloudId: "${config.global.cloud_id}"
          environmentId: "${config.global.environment_id}"
          extension:
            type: "issuePanel"
          type: "issuePanel"
